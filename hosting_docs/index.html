<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServisI/O - Manajemen Bengkel Modern</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --surface: #f8fafc;
            --text: #1e293b;
            --text-muted: #64748b;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--surface);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
        }
        h1 {
            font-weight: 800;
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }
        p {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            border: 2px solid var(--primary);
            border-radius: 12px;
            transition: all 0.3s;
        }
        .links a:hover {
            background: var(--primary);
            color: white;
        }
        footer {
            margin-top: auto;
            padding: 40px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ServisI/O</h1>
        <p>Teknologi Presisi untuk Manajemen Bengkel Modern</p>
        <div class="links">
            <a href="privacy.html">Kebijakan Privasi</a>
            <a href="terms.html">Syarat & Ketentuan</a>
            <a href="faq.html">Bantuan & FAQ</a>
        </div>
    </div>
    <footer>
        &copy; 2026 ServisI/O Platforms. All rights reserved.
    </footer>
</body>
</html>
